<div class="detail-container">
  <div class="loading" *ngIf="loading">
    <div class="spinner"></div>
    <p>Loading album...</p>
  </div>

  <div class="error" *ngIf="error">{{ error }}</div>

  <div class="detail-card" *ngIf="!loading && album">
    <div class="card-header">
      <button class="btn-back" (click)="goBack()">← Back</button>
      <span class="badge">Album #{{ album.id }}</span>
    </div>

    <div class="album-meta">
      <div class="meta-item">
        <span class="meta-label">User ID</span>
        <span class="meta-value">{{ album.userId }}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Album ID</span>
        <span class="meta-value">{{ album.id }}</span>
      </div>
    </div>

    <div class="edit-section">
      <label class="field-label">Album Title</label>
      <input type="text" class="title-input" [(ngModel)]="editTitle" />
      <div class="edit-actions">
        <button
          class="btn-save"
          (click)="saveAlbum()"
          [disabled]="saving || !editTitle || editTitle.trim() === ''"
        >
          {{ saving ? 'Saving...' : '💾 Save Title' }}
        </button>
        <span class="success-msg" *ngIf="saveSuccess">✅ Saved!</span>
      </div>
    </div>

    <div class="nav-actions">
      <a [routerLink]="['/albums', album.id, 'photos']" class="btn-photos">
        🖼️ View Photos
      </a>
    </div>
  </div>
</div>
