<div class="photos-container">
  <div class="page-header">
    <button class="btn-back" (click)="goBack()">← Back</button>
    <h1>📸 Photos — Album #{{ albumId }}</h1>
    <span class="count" *ngIf="!loading">{{ photos.length }} photos</span>
  </div>

  <div class="loading" *ngIf="loading">
    <div class="spinner"></div>
    <p>Loading photos...</p>
  </div>

  <div class="error" *ngIf="error">{{ error }}</div>

  <div class="photo-grid" *ngIf="!loading && !error">
    <div class="photo-card" *ngFor="let photo of photos">
      <img [src]="photo.thumbnailUrl" [alt]="photo.title" loading="lazy" />
      <div class="photo-overlay">
        <p class="photo-title">{{ photo.title }}</p>
      </div>
    </div>
  </div>

  <div class="empty" *ngIf="!loading && !error && photos.length === 0">
    <p>No photos found.</p>
  </div>
</div>
